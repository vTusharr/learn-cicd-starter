name: cd

on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.0"
            - name: Authenticate with GCP
              uses: "google-github-actions/auth@v2"
              with:
                  credentials_json: "${{ secrets.GCP_CREDENTIALS }}"
            - name: "Set up Cloud SDK"
              uses: "google-github-actions/setup-gcloud@v3"         
            - name: build
              run: ./scripts/buildprod.sh
            - name: submit to cd
              run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-496314/notely-ar-repo/notely-app:latest .
            - name: Deploy to Cloud Run
              run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-496314/notely-ar-repo/notely-app:latest --region us-central1 --allow-unauthenticated --project notely-496314 --max-instances=4

