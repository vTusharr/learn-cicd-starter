name: ci

on:
    pull_request:
        branches: [main]

jobs:
    Style:
        name: Style
        runs-on : debian-latest
        
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.0"

            - name: testingg
              run: test -z $(go fmt ./...)

        
    
    tests:
        name: Tests
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.0"

            - name: testingg
              run: go test -cover  ./...
